version: "3.9"

services:
  web:
    build: .
    container_name: teamflow_web
    command: >
      uvicorn config.asgi:application
      --host 0.0.0.0
      --port 8000
      --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: teamflow_db
    environment:
      POSTGRES_DB: teamflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: teamflow_redis
    ports:
      - "6379:6379"

  celery_worker:
    build: .
    container_name: teamflow_celery_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
      - db

  celery_beat:
    build: .
    container_name: teamflow_celery_beat
    command: celery -A config beat -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

volumes:
  postgres_data: